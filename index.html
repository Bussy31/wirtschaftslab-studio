<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lege-Video Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root {
            --primary: #8e44ad; --primary-dark: #7d3c98;
            --success: #27ae60; --danger: #c0392b; --warning: #f39c12; --info: #3498db;
            --bg: #f4f7f6; --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center; background-color: var(--bg); color: var(--text);
            padding: 10px; margin: 0; overflow-x: hidden;
        }

        h1 { margin: 0 0 15px 0; font-size: 22px; color: #2c3e50; }

        .toolbar { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }

        button {
            padding: 8px 16px; font-size: 14px; cursor: pointer; border: none; border-radius: 5px;
            transition: background 0.2s, transform 0.1s; font-weight: bold; text-transform: uppercase;
        }
        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-audio { background-color: #007bff; color: white; }
        .btn-audio.recording { background-color: var(--danger); animation: pulse 1.5s infinite; }
        .btn-tool { background-color: #dee2e6; color: var(--text); }
        .btn-tool:hover { background-color: #ced4da; }
        .btn-wischen { background-color: var(--warning); color: white; }
        .btn-search { background-color: var(--success); color: white; border-radius: 0 5px 5px 0; margin: 0; }

        .btn-preview { background-color: var(--info); color: white; padding: 12px; font-size: 15px; }
        .btn-preview:hover { background-color: #2980b9; }
        .btn-render { background-color: var(--primary); color: white; padding: 12px; font-size: 15px; box-shadow: 0 4px 6px rgba(142,68,173,0.3); }
        .btn-render:hover { background-color: var(--primary-dark); }

        .search-box { display: flex; justify-content: center; margin-bottom: 5px; }
        input[type="text"] { padding: 8px 12px; width: 280px; border: 1px solid #ccc; border-radius: 5px 0 0 5px; font-size: 14px; margin-right: -1px; }
        input[type="text"]:focus { outline: none; border-color: var(--success); }

        .hint-text { font-size: 13px; color: #7f8c8d; margin-bottom: 10px; font-weight: 500; }
        .highlight { color: var(--primary); font-weight: bold; }

        #searchResults {
            display: flex; gap: 10px; justify-content: center; align-items: center;
            height: 65px; margin-bottom: 15px; padding: 0 10px; color: #666;
        }

        .canvas-container-wrapper {
            position: relative; width: 800px; margin: 0 auto;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1); border: 2px solid #ccc; background-color: white; border-radius: 4px;
        }

        #wipeArm {
            position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Sponge-153862.svg/512px-Sponge-153862.svg.png') right center no-repeat;
            background-size: 150px; z-index: 100; pointer-events: none;
        }

        #timeline-container { width: 100%; height: 25px; background: #eee; border-top: 1px solid #ccc; position: relative; cursor: pointer; }
        #playhead { width: 2px; height: 100%; background: red; position: absolute; left: 0; z-index: 10; pointer-events: none; }
        #markers { width: 100%; height: 100%; position: absolute; pointer-events: none; }

        .bottom-controls { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 15px; }
        #audioPlayback { display: none; } /* Unsichtbar gemacht! */

        .action-buttons { display: flex; gap: 15px; width: 800px; display: none; }
        .action-buttons button { flex: 1; }
    </style>
</head>
<body>

    <h1>Lege-Video Studio 🎬</h1>

    <div class="toolbar">
        <button id="recordBtn" class="btn-audio">🎙️ 1. Ton aufnehmen</button>
        <button id="addTextBtn" class="btn-tool">✍️ Text</button>
        <button id="deleteBtn" class="btn-tool">🗑️ Markiertes Löschen</button>
        <button id="clearBtn" class="btn-wischen">🧹 Alles Wischen</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Bilder suchen (z.B. Auto, PC)...">
        <button id="searchBtn" class="btn-search">Suchen</button>
    </div>

    <div class="hint-text">
        💡 Klick auf Bilder zum Platzieren | <span class="highlight">Klick in die Zeitleiste</span> für Zeitreisen | Leertaste = Play/Pause
    </div>

    <div id="searchResults">Suche nach Begriffen, um Bilder zu finden...</div>

    <div class="canvas-container-wrapper" id="dropZone">
        <div id="wipeArm"></div>
        <canvas id="fabricCanvas" width="800" height="450"></canvas>
        <div id="timeline-container" title="Klicke hier, um zu einer Zeit zu springen">
            <div id="playhead"></div>
            <div id="markers"></div>
        </div>
    </div>

    <div class="bottom-controls">
        <audio id="audioPlayback"></audio>
        <div class="action-buttons" id="actionButtons">
            <button id="previewBtn" class="btn-preview">▶️ Live-Vorschau starten</button>
            <button id="exportBtn" class="btn-render">🎬 Als Video speichern!</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
