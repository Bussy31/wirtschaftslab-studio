<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Berufskolleg Lege-Video Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root {
            --primary: #8e44ad; --primary-dark: #7d3c98;
            --secondary: #2c3e50; --success: #27ae60; --danger: #c0392b;
            --warning: #f39c12; --bg: #f4f7f6; --text: #333;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: var(--bg); color: var(--text); padding: 0; margin: 0; }

        /* Header */
        header { background: white; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h1 { margin: 0; font-size: 24px; color: var(--secondary); }

        /* Haupt-Container */
        .main-container { max-width: 850px; margin: 20px auto; padding: 0 20px; padding-bottom: 50px;}

        /* Toolbar-Gruppen */
        .toolbar-group { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.03); display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; align-items: center;}
        .toolbar-group-label { font-size: 12px; text-transform: uppercase; color: #999; letter-spacing: 1px; width: 100%; margin-bottom: 5px;}

        /* Button-Styles */
        button {
            padding: 10px 20px; font-size: 14px; cursor: pointer; border: none; border-radius: 6px;
            transition: background 0.2s, transform 0.1s; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
            display: flex; align-items: center; gap: 8px;
        }
        button:active { transform: scale(0.97); }

        .btn-audio { background-color: #007bff; color: white; }
        .btn-audio.recording { background-color: var(--danger); animation: pulse 1.5s infinite; }
        .btn-tool { background-color: #eee; color: var(--text); }
        .btn-tool:hover { background-color: #e0e0e0; }
        .btn-wischen { background-color: var(--warning); color: white; }
        .btn-search { background-color: var(--success); color: white; border-radius: 0 6px 6px 0; margin: 0; padding: 10px 25px;}
        .btn-render { background-color: var(--primary); color: white; font-size: 16px; padding: 12px 30px; border-radius: 30px; box-shadow: 0 4px 10px rgba(142,68,173,0.3);}
        .btn-render:hover { background-color: var(--primary-dark); }

        /* Suche */
        input[type="text"] {
            padding: 10px 15px; width: 300px; border: 1px solid #ccc; border-radius: 6px 0 0 6px; font-size: 14px; margin-right: -1px;
        }
        input[type="text"]:focus { outline: none; border-color: var(--success); box-shadow: 0 0 5px rgba(39,174,96,0.3); }

        /* Ergebnisse */
        #searchResults { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; min-height: 70px; padding: 10px; background: rgba(0,0,0,0.02); border-radius: 6px;}

        /* Canvas-Container */
        .canvas-container-wrapper { position: relative; width: 800px; height: 480px; margin: 0 auto; box-shadow: 0px 10px 25px rgba(0,0,0,0.1); overflow: hidden; border-radius: 10px; background-color: white;}

        /* Wischarm */
        #wipeArm {
            position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Sponge-153862.svg/512px-Sponge-153862.svg.png') right center no-repeat;
            background-size: 150px; z-index: 100; pointer-events: none;
        }

        /* Timeline */
        #timeline-container { width: 100%; height: 30px; background: #eee; border-top: 1px solid #e0e0e0; position: relative; cursor: pointer; margin-top: -30px; z-index: 50; }
        #playhead { width: 2px; height: 100%; background: red; position: absolute; left: 0; z-index: 10; }
        #markers { width: 100%; height: 100%; position: absolute; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <h1>Lege-Video Studio 🎬</h1>
    </header>

    <div class="main-container">

        <div class="toolbar-group">
            <div class="toolbar-group-label">Schritt 1: Aufnahme</div>
            <button id="recordBtn" class="btn-audio">🎙️ Ton aufnehmen</button>
            <audio id="audioPlayback" controls style="display: none; width: 400px; height: 35px;"></audio>
        </div>

        <div class="toolbar-group">
            <div class="toolbar-group-label">Schritt 2: Lege-Effekte</div>
            <button id="addTextBtn" class="btn-tool">✍️ Text hinzufügen</button>
            <button id="deleteBtn" class="btn-tool">🗑️ Markiertes Löschen</button>
            <button id="clearBtn" class="btn-wischen">🧹 Alles Wischen</button>
        </div>

        <div class="toolbar-group">
            <div class="toolbar-group-label">Schritt 3: Bilder finden (PC- Drag & Drop)</div>
            <div style="display: flex;">
                <input type="text" id="searchInput" placeholder="Bilder suchen (z.B. Auto, Schule)...">
                <button id="searchBtn" class="btn-search">Suchen</button>
            </div>
            <div id="searchResults" style="width: 100%;"></div>
        </div>

        <div class="canvas-container-wrapper" id="dropZone">
            <div id="wipeArm"></div>
            <canvas id="fabricCanvas" width="800" height="450"></canvas>

            <div id="timeline-container">
                <div id="playhead"></div>
                <div id="markers"></div>
            </div>
        </div>

        <div style="margin-top: 30px;">
            <button id="exportBtn" class="btn-render" style="margin: 0 auto;">🎬 Schritt 4: Als Video speichern!</button>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
